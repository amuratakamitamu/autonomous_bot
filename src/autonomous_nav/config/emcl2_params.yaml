emcl2:
  ros__parameters:
    use_sim_time: false
    odom_freq: 20
    num_particles: 500
    odom_frame_id: "odom"
    footprint_frame_id: "base_footprint"
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    odom_fw_dev_per_fw: 0.19
    odom_fw_dev_per_rot: 0.0001
    odom_rot_dev_per_fw: 0.13
    odom_rot_dev_per_rot: 0.2
    laser_likelihood_max_dist: 0.2
    scan_increment: 1
    alpha_threshold: 0.5
    open_space_threshold: 0.05
    expansion_radius_position: 0.1
    expansion_radius_orientation: 0.2
    extraction_rate: 0.1
    range_threshold: 0.3
    sensor_reset: true
